<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BB Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; font-size: 14px; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; }
#header { background: #16213e; padding: 8px 12px; display: -webkit-flex; display: flex; -webkit-justify-content: space-between; justify-content: space-between; -webkit-align-items: center; align-items: center; border-bottom: 1px solid #0f3460; }
#header h1 { font-size: 16px; color: #e94560; }
#header-btns button { background: #0f3460; color: #e0e0e0; border: none; padding: 5px 10px; margin-left: 4px; cursor: pointer; border-radius: 3px; font-size: 13px; }
#chat-area { -webkit-flex: 1; flex: 1; overflow-y: auto; padding: 10px; }
.message { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 88%; word-wrap: break-word; }
.message.user { background: #0f3460; margin-left: auto; }
.message.assistant { background: #16213e; border: 1px solid #0f3460; }
.message.sys { background: #1a1a2e; border: 1px dashed #555; font-size: 12px; color: #aaa; max-width: 100%; }
#input-area { padding: 8px; background: #16213e; border-top: 1px solid #0f3460; display: -webkit-flex; display: flex; gap: 6px; }
#user-input { -webkit-flex: 1; flex: 1; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; padding: 8px; border-radius: 4px; font-size: 14px; resize: none; }
#send-btn { background: #e94560; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; }
#modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 100; overflow-y: auto; }
#modal { background: #16213e; border: 1px solid #0f3460; margin: 15px auto; max-width: 460px; border-radius: 6px; padding: 16px; }
#modal h2 { color: #e94560; margin-bottom: 12px; font-size: 14px; }
.fg { margin-bottom: 10px; }
.fg label { display: block; font-size: 11px; color: #aaa; margin-bottom: 3px; }
.fg input, .fg select, .fg textarea { width: 100%; background: #1a1a2e; color: #e0e0e0; border: 1px solid #0f3460; padding: 6px 8px; border-radius: 3px; font-size: 13px; }
.fg textarea { height: 55px; resize: vertical; }
.mbtns { display: -webkit-flex; display: flex; gap: 8px; margin-top: 12px; }
.mbtns button { -webkit-flex: 1; flex: 1; padding: 8px; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
#save-btn { background: #e94560; color: white; }
#close-btn { background: #0f3460; color: #e0e0e0; }
.tag { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; margin-right: 3px; }
.tp { background: #0f3460; }
.ton { background: #1a4a1a; color: #7f7; }
.toff { background: #3a1a1a; color: #f77; }
.srctag { font-size: 11px; color: #888; font-style: italic; margin-bottom: 3px; }
hr.sep { border: none; border-top: 1px solid #0f3460; margin: 12px 0; }
</style>
</head>
<body>

<div id="header">
  <h1>BB Chat</h1>
  <div id="header-btns">
    <span class="tag tp" id="p-tag">-</span><span class="tag toff" id="s-tag">Search:OFF</span>
    <button id="search-btn">&#128269;</button>
    <button id="clear-btn">&#128465;</button>
    <button id="settings-btn">&#9881;</button>
  </div>
</div>

<div id="chat-area"></div>

<div id="input-area">
  <textarea id="user-input" rows="2" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
  <button id="send-btn">Send</button>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>&#9881; LLM Settings</h2>
    <div class="fg">
      <label>Provider</label>
      <select id="sel-prov">
        <option value="openrouter">OpenRouter (Free models available)</option>
        <option value="groq">Groq (Free tier)</option>
        <option value="gemini">Google Gemini (Free tier)</option>
      </select>
    </div>
    <div class="fg">
      <label>Model (select preset)</label>
      <select id="sel-model"></select>
    </div>
    <div class="fg">
      <label>Custom Model ID (overrides dropdown)</label>
      <input type="text" id="custom-model" placeholder="e.g. meta-llama/llama-3.3-70b-instruct:free">
    </div>
    <div class="fg">
      <label>API Key</label>
      <input type="password" id="api-key" placeholder="Paste your API key here">
    </div>

    <hr class="sep">
    <h2>&#128269; Web Search</h2>
    <div class="fg">
      <label>Search Provider</label>
      <select id="sel-search">
        <option value="ddg">DuckDuckGo (No key needed)</option>
        <option value="brave">Brave Search (Free key required)</option>
      </select>
    </div>
    <div class="fg" id="brave-grp">
      <label>Brave Search API Key (get free at search.brave.com/api)</label>
      <input type="password" id="brave-key" placeholder="BSA...">
    </div>

    <hr class="sep">
    <h2>&#128172; System Prompt</h2>
    <div class="fg">
      <textarea id="sys-prompt" placeholder="You are a helpful assistant."></textarea>
    </div>

    <div class="mbtns">
      <button id="save-btn">&#128190; Save</button>
      <button id="close-btn">Cancel</button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-1.9.1.min.js"></script>
<script>
var MODELS = {
    openrouter: [
        'meta-llama/llama-3.3-70b-instruct:free',
        'deepseek/deepseek-r1:free',
        'google/gemma-3-27b-it:free',
        'mistralai/mistral-7b-instruct:free',
        'qwen/qwen-2.5-72b-instruct:free',
        'microsoft/phi-4:free'
    ],
    groq: [
        'llama-3.3-70b-versatile',
        'llama-3.1-8b-instant',
        'mixtral-8x7b-32768',
        'gemma2-9b-it',
        'deepseek-r1-distill-llama-70b'
    ],
    gemini: [
        'gemini-2.0-flash',
        'gemini-1.5-flash',
        'gemini-1.5-flash-8b',
        'gemini-1.5-pro'
    ]
};

var S = {
    provider: 'openrouter',
    model: 'meta-llama/llama-3.3-70b-instruct:free',
    apiKey: '',
    searchOn: false,
    searchProv: 'ddg',
    braveKey: '',
    sysPrompt: 'You are a helpful assistant. Be concise.',
    msgs: []
};

function loadS() {
    var raw = localStorage.getItem('bbchat_v1');
    if (raw) {
        try {
            var p = JSON.parse(raw);
            S.provider   = p.provider   || S.provider;
            S.model      = p.model      || S.model;
            S.apiKey     = p.apiKey     || S.apiKey;
            S.searchOn   = p.searchOn   || false;
            S.searchProv = p.searchProv || 'ddg';
            S.braveKey   = p.braveKey   || '';
            S.sysPrompt  = p.sysPrompt  || S.sysPrompt;
        } catch(e) {}
    }
    refreshBar();
}

function saveS() {
    localStorage.setItem('bbchat_v1', JSON.stringify({
        provider: S.provider, model: S.model, apiKey: S.apiKey,
        searchOn: S.searchOn, searchProv: S.searchProv,
        braveKey: S.braveKey, sysPrompt: S.sysPrompt
    }));
}

function refreshBar() {
    var shortModel = S.model.indexOf('/') > -1 ? S.model.split('/').pop() : S.model;
    $('#p-tag').text(S.provider + ':' + shortModel.replace(':free','(free)'));
    if (S.searchOn) {
        $('#s-tag').text('Search:ON [' + S.searchProv + ']').removeClass('toff').addClass('ton');
    } else {
        $('#s-tag').text('Search:OFF').removeClass('ton').addClass('toff');
    }
}

function addMsg(role, text, note) {
    var cls = role === 'user' ? 'user' : (role === 'sys' ? 'sys' : 'assistant');
    var div = $('<div class="message ' + cls + '">');
    if (note) { div.append($('<div class="srctag">').text(note)); }
    div.append($('<span>').html($('<div>').text(text).html().replace(/\n/g, '<br>')));
    $('#chat-area').append(div);
    var ca = document.getElementById('chat-area');
    ca.scrollTop = ca.scrollHeight;
}

function addThinking() {
    $('#chat-area').append('<div class="message assistant" id="tmsg"><em>Thinking...</em></div>');
    var ca = document.getElementById('chat-area'); ca.scrollTop = ca.scrollHeight;
}
function rmThinking() { $('#tmsg').remove(); }

// ---- WEB SEARCH ----
function doSearch(q, cb) {
    if (S.searchProv === 'brave' && S.braveKey) {
        var proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(
            'https://api.search.brave.com/res/v1/web/search?q=' + encodeURIComponent(q) + '&count=5'
        );
        $.ajax({
            url: proxyUrl,
            headers: { 'X-Subscription-Token': S.braveKey, 'Accept': 'application/json' },
            success: function(d) {
                var out = '';
                if (d.web && d.web.results) {
                    $.each(d.web.results.slice(0,5), function(i, r) {
                        out += (i+1) + '. ' + r.title + '\n' + r.url + '\n' + (r.description||'') + '\n\n';
                    });
                }
                cb(out || 'No results.', 'Brave Search');
            },
            error: function() { cb('Brave search failed — check your key.', 'Brave Search'); }
        });
    } else {
        // DuckDuckGo JSONP (no key needed)
        $.getJSON(
            'https://api.duckduckgo.com/?q=' + encodeURIComponent(q) + '&format=json&no_html=1&skip_disambig=1&callback=?',
            function(d) {
                var out = '';
                if (d.Answer)       { out += 'Direct Answer: ' + d.Answer + '\n\n'; }
                if (d.AbstractText) { out += 'Summary: ' + d.AbstractText + '\n\n'; }
                if (d.RelatedTopics && d.RelatedTopics.length) {
                    out += 'Related Topics:\n';
                    $.each(d.RelatedTopics.slice(0,5), function(i,t) {
                        if (t.Text) { out += '- ' + t.Text + '\n'; }
                    });
                }
                cb(out || 'No instant answer found.', 'DuckDuckGo');
            }
        ).error(function() { cb('DuckDuckGo unavailable.', 'DuckDuckGo'); });
    }
}

// ---- LLM CALLS ----
function callOAI(url, hdrs, payload, onOk, onErr) {
    $.ajax({
        url: url, method: 'POST', headers: hdrs,
        contentType: 'application/json', data: JSON.stringify(payload),
        success: function(d) {
            try { onOk(d.choices[0].message.content); }
            catch(e) { onErr('Bad response shape: ' + JSON.stringify(d).slice(0,200)); }
        },
        error: function(xhr) {
            var m = 'API Error ' + xhr.status;
            try { m += ': ' + JSON.parse(xhr.responseText).error.message; } catch(e) {}
            onErr(m);
        }
    });
}

function callGemini(model, key, msgs, sysp, onOk, onErr) {
    var contents = [];
    $.each(msgs, function(i, m) {
        if (m.role !== 'system') {
            contents.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{text: m.content}] });
        }
    });
    var payload = { contents: contents, generationConfig: { maxOutputTokens: 2048 } };
    if (sysp) { payload.systemInstruction = { parts: [{text: sysp}] }; }
    $.ajax({
        url: 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key,
        method: 'POST', contentType: 'application/json', data: JSON.stringify(payload),
        success: function(d) {
            try { onOk(d.candidates[0].content.parts[0].text); }
            catch(e) { onErr('Gemini parse error'); }
        },
        error: function(xhr) {
            var m = 'Gemini Error ' + xhr.status;
            try { m += ': ' + JSON.parse(xhr.responseText).error.message; } catch(e) {}
            onErr(m);
        }
    });
}

function dispatchLLM(searchCtx) {
    addThinking();
    var sys = S.sysPrompt || 'You are a helpful assistant.';
    if (searchCtx) {
        sys += '\n\n[WEB SEARCH RESULTS]\n' + searchCtx.text + '\n[END SEARCH RESULTS]\nUse the above to answer the user\'s question accurately.';
    }
    var noteLabel = searchCtx ? ('&#128269; ' + searchCtx.source) : null;

    var onOk = function(txt) {
        rmThinking();
        addMsg('assistant', txt, noteLabel);
        S.msgs.push({ role: 'assistant', content: txt });
        if (S.msgs.length > 20) { S.msgs = S.msgs.slice(S.msgs.length - 20); }
    };
    var onErr = function(e) { rmThinking(); addMsg('sys', '❌ ' + e); };

    if (S.provider === 'gemini') {
        callGemini(S.model, S.apiKey, S.msgs, sys, onOk, onErr);
    } else {
        var url = S.provider === 'groq'
            ? 'https://api.groq.com/openai/v1/chat/completions'
            : 'https://openrouter.ai/api/v1/chat/completions';
        var hdrs = { 'Authorization': 'Bearer ' + S.apiKey };
        if (S.provider === 'openrouter') {
            hdrs['HTTP-Referer'] = 'https://github.com';
            hdrs['X-Title'] = 'BB Chat';
        }
        var msgs = [{ role: 'system', content: sys }].concat(S.msgs);
        callOAI(url, hdrs, { model: S.model, messages: msgs, max_tokens: 2048 }, onOk, onErr);
    }
}

function sendMessage() {
    var txt = $.trim($('#user-input').val());
    if (!txt) return;
    if (!S.apiKey) {
        addMsg('sys', '⚠ No API key set. Tap ⚙ Settings to add one.');
        return;
    }
    $('#user-input').val('');
    addMsg('user', txt);
    S.msgs.push({ role: 'user', content: txt });

    if (S.searchOn) {
        addMsg('sys', '🔍 Searching the web for: ' + txt);
        doSearch(txt, function(results, source) {
            $('.message.sys:last').remove();
            dispatchLLM({ text: results, source: source });
        });
    } else {
        dispatchLLM(null);
    }
}

// ---- SETTINGS MODAL ----
function fillModels(prov) {
    var sel = $('#sel-model').empty();
    $.each(MODELS[prov], function(i, m) { sel.append($('<option>').val(m).text(m)); });
    if (S.provider === prov) { sel.val(S.model); }
}

$('#settings-btn').on('click', function() {
    $('#sel-prov').val(S.provider);
    fillModels(S.provider);
    $('#sel-model').val(S.model);
    $('#custom-model').val('');
    $('#api-key').val(S.apiKey);
    $('#sel-search').val(S.searchProv);
    $('#brave-key').val(S.braveKey);
    $('#sys-prompt').val(S.sysPrompt);
    $('#brave-grp').toggle(S.searchProv === 'brave');
    $('#modal-overlay').show();
});

$('#sel-prov').on('change', function() { fillModels($(this).val()); });
$('#sel-search').on('change', function() { $('#brave-grp').toggle($(this).val() === 'brave'); });

$('#save-btn').on('click', function() {
    S.provider   = $('#sel-prov').val();
    var cm       = $.trim($('#custom-model').val());
    S.model      = cm || $('#sel-model').val();
    S.apiKey     = $.trim($('#api-key').val());
    S.searchProv = $('#sel-search').val();
    S.braveKey   = $.trim($('#brave-key').val());
    S.sysPrompt  = $.trim($('#sys-prompt').val()) || 'You are a helpful assistant.';
    saveS(); refreshBar(); $('#modal-overlay').hide();
});

$('#close-btn').on('click', function() { $('#modal-overlay').hide(); });

$('#search-btn').on('click', function() {
    S.searchOn = !S.searchOn; saveS(); refreshBar();
    addMsg('sys', 'Web search ' + (S.searchOn ? 'ENABLED (' + S.searchProv + ')' : 'DISABLED'));
});

$('#clear-btn').on('click', function() {
    S.msgs = []; $('#chat-area').empty();
    addMsg('sys', 'Conversation cleared.');
});

$('#send-btn').on('click', sendMessage);
$('#user-input').on('keypress', function(e) {
    if (e.which === 13 && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ---- INIT ----
loadS();
addMsg('sys', 'Welcome to BB Chat! Tap ⚙ to set your API key and model. Tap 🔍 to toggle web search on/off.');
</script>
</body>
</html>
